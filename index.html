<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Valutazione Progetto - Horo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:black;
padding:20px 0;
text-align:center;
}

header h2{
color:#C9A84C;
margin:0;
font-size:22px;
letter-spacing:2px;
}

.container{
width:1100px;
margin:30px auto;
}

h1{
color:black;
border-bottom:3px solid #C9A84C;
padding-bottom:10px;
}

.section{
background:white;
padding:25px;
margin-bottom:25px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.section-title{
background:#C9A84C;
color:white;
padding:10px;
margin:-25px -25px 20px -25px;
border-radius:8px 8px 0 0;
font-weight:bold;
}

/* Grid a 2 colonne per i dati iniziali */
.grid-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px 30px;
}

.grid-full{
grid-column: 1 / -1;
}

label{
display:block;
margin-top:5px;
font-weight:bold;
font-size:14px;
}

select, input{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
box-sizing:border-box;
font-size:14px;
}

select:focus, input:focus{
outline:none;
border-color:#C9A84C;
box-shadow:0 0 0 2px rgba(201,168,76,0.3);
}

button{
background:#C9A84C;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
cursor:pointer;
border-radius:5px;
margin-top:20px;
}

button:hover{
background:#a8873a;
}

.result-box{
padding:15px;
margin-top:15px;
border-radius:6px;
font-weight:bold;
}

.green{background:#d4edda;}
.yellow{background:#fff3cd;}
.red{background:#f8d7da;}

#valore_fascia_container{
display:none;
}
</style>
</head>

<body>

<header>
  <h2>HORO | TAILOR MADE INTERIORS</h2>
</header>

<div class="container">

<h1>Valutazione Complessità e Interesse Progetto</h1>

<!-- DATI INIZIALI -->
<div class="section">
<div class="section-title">Dati Iniziali</div>

<div class="grid-2">

  <div>
    <label>Titolo Progetto</label>
    <input type="text" id="titoloProgetto">
  </div>

  <div>
    <label>Nome referente progetto</label>
    <input type="text" id="referente">
  </div>

  <div>
    <label>Data ricezione richiesta cliente</label>
    <input type="date" id="dataRicezione">
  </div>

  <div>
    <label>Data richiesta per invio offerta</label>
    <input type="date" id="dataOfferta">
  </div>

  <div>
    <label>Ref. comm.le</label>
    <select id="refCommerciale">
      <option value="">-- Seleziona --</option>
      <option>Maurizio Picciolini</option>
      <option>Alessandro Balli</option>
      <option>Domenico Salvati</option>
      <option>Sandro Picciolini</option>
      <option>Alberto Picciolini</option>
    </select>
  </div>

  <div>
    <label>Finanziamento/Bando</label>
    <select id="finanziamento">
      <option value="">-- Seleziona --</option>
      <option>Sì</option>
      <option>No</option>
    </select>
  </div>

  <div>
    <label>Budget</label>
    <select id="budget">
      <option value="">-- Seleziona --</option>
      <option>Sì</option>
      <option>No</option>
    </select>
  </div>

</div>
</div>

<!-- COMPLESSITÀ -->
<div class="section">
<div class="section-title">Complessità</div>
<div id="complessita"></div>
<div id="risultatoComplessita"></div>
</div>

<!-- INTERESSE -->
<div class="section">
<div class="section-title">Interesse del Progetto</div>
<div id="interesse"></div>
<div id="risultatoInteresse"></div>
</div>

<!-- ESITO FINALE -->
<div class="section">
<div class="section-title">Esito Finale</div>
<div id="esitoFinale"></div>
<button onclick="scaricaEApriMail()">⬇️ Scarica XLSX e Apri Mail</button>
</div>

</div>

<script>

const complessitaData = [
{
  domanda:"Completezza/qualità delle specifiche del Cliente",
  opzioni:[
    "Esaustive o proposta nostra (tappezzeria)",
    "Sufficienti o proposta nostra (falegnameria)",
    "Poco chiara e/o eccessive"
  ],
  punteggi:[1,2,3],
  peso:0.24
},
{
  domanda:"Camere o Zone Comuni?",
  opzioni:[
    "Solo Camere",
    "Zone comuni"
  ],
  punteggi:[1,3],
  peso:0.07
},
{
  domanda:"Modello nuovo",
  opzioni:[
    "Nessun modello nuovo (né per tapp né per fale)",
    "Modello nuovo almeno per una tra tapp e fale",
    "Modello nuovo o ricoperture (sia per tapp che per fale)"
  ],
  punteggi:[1,2,3],
  peso:0.12
},
{
  domanda:"Componenti che richiedono coinvolgimento di un terzista",
  opzioni:[
    "No",
    "Sì, solo complementi",
    "Sì, parti sostanziali o prodotti completi"
  ],
  punteggi:[1,2,3],
  peso:0.07
},
{
  domanda:"Complessità materiali",
  opzioni:[
    "Materiali semplici",
    "Materiali medi",
    "Materiali complessi"
  ],
  punteggi:[1,2,3],
  peso:0.16
},
{
  domanda:"Numerosità di articoli diversi",
  opzioni:[
    "<= 15",
    "> 15"
  ],
  punteggi:[1,3],
  peso:0.16
},
{
  domanda:"Complessità strutturale",
  opzioni:[
    "Struttura semplice (lineare)",
    "Struttura con elementi curvi/modulari",
    "Struttura complessa (curve, elementi speciali, meccanismi integrati)"
  ],
  punteggi:[1,2,3],
  peso:0.11
},
{
  domanda:"Complessità logistica",
  opzioni:[
    "Logistica semplice (consegne anche ingombranti direttamente in struttura)",
    "Logistica media",
    "Logistica complessa (ZTL, centro storico, isole, barche, ecc.)"
  ],
  punteggi:[1,2,3],
  peso:0.07
}
];

const soglieLabels = {
  tappezzeria: ["< 20.000€", "< 200.000€", "> 200.000€"],
  falegnameria: ["< 70.000€", "< 200.000€", "> 200.000€"],
  entrambe:    ["< 70.000€", "< 200.000€", "> 200.000€"]
};

const clienteOpzioni = [
  {label:"Cliente con forte potenziale (es. nuovo in conquista o da riconquistare)/gare", val:3},
  {label:"Cliente noto importante", val:2},
  {label:"Cliente noto marginale/piccolo", val:1}
];

function renderComplessita(){
  let container = document.getElementById("complessita");
  complessitaData.forEach((item, index) => {
    let label = document.createElement("label");
    label.innerText = item.domanda;
    let select = document.createElement("select");
    select.id = "complessita_" + index;
    select.innerHTML = "<option value=''>-- Seleziona --</option>";
    item.opzioni.forEach((op, i) => {
      select.innerHTML += `<option value="${i}">${op}</option>`;
    });
    select.onchange = calcola;
    container.appendChild(label);
    container.appendChild(select);
  });
}

function renderInteresse(){
  let container = document.getElementById("interesse");

  let lTipo = document.createElement("label");
  lTipo.innerText = "Tipo progetto";
  let sTipo = document.createElement("select");
  sTipo.id = "tipo_progetto";
  sTipo.innerHTML = "<option value=''>-- Seleziona --</option>" +
    "<option value='tappezzeria'>Tappezzeria</option>" +
    "<option value='falegnameria'>Falegnameria</option>" +
    "<option value='entrambe'>Entrambe</option>";
  sTipo.onchange = aggiorneFasceValore;
  container.appendChild(lTipo);
  container.appendChild(sTipo);

  let fasciaContainer = document.createElement("div");
  fasciaContainer.id = "valore_fascia_container";
  fasciaContainer.style.display = "none";

  let lFascia = document.createElement("label");
  lFascia.innerText = "Valore del progetto";
  let sFascia = document.createElement("select");
  sFascia.id = "valore_fascia";
  sFascia.innerHTML = "<option value=''>-- Seleziona --</option>";
  sFascia.onchange = calcola;

  fasciaContainer.appendChild(lFascia);
  fasciaContainer.appendChild(sFascia);
  container.appendChild(fasciaContainer);

  let lCliente = document.createElement("label");
  lCliente.innerText = "Tipologia cliente";
  let sCliente = document.createElement("select");
  sCliente.id = "tipologia_cliente";
  sCliente.innerHTML = "<option value=''>-- Seleziona --</option>";
  clienteOpzioni.forEach((op, i) => {
    sCliente.innerHTML += `<option value="${i}">${op.label}</option>`;
  });
  sCliente.onchange = calcola;
  container.appendChild(lCliente);
  container.appendChild(sCliente);
}

function aggiorneFasceValore(){
  let tipo = document.getElementById("tipo_progetto").value;
  let fasciaContainer = document.getElementById("valore_fascia_container");
  let sFascia = document.getElementById("valore_fascia");

  if(tipo === ""){
    fasciaContainer.style.display = "none";
    sFascia.value = "";
    return;
  }

  fasciaContainer.style.display = "block";
  let labels = soglieLabels[tipo];
  sFascia.innerHTML = "<option value=''>-- Seleziona --</option>";
  labels.forEach((label, i) => {
    sFascia.innerHTML += `<option value="${i+1}">${label}</option>`;
  });

  calcola();
}

renderComplessita();
renderInteresse();

function calcola(){
  let totale = 0;
  let completo = true;

  complessitaData.forEach((item, index) => {
    let val = document.getElementById("complessita_" + index).value;
    if(val === "") completo = false;
    if(val !== ""){
      totale += item.punteggi[val] * item.peso;
    }
  });

  if(completo){
    totale = parseFloat(totale.toFixed(2));
    let classe = "";
    let colore = "green";

    if(totale <= 1.7){ classe = "BASSO"; colore = "green"; }
    else if(totale <= 2.3){ classe = "MEDIO"; colore = "yellow"; }
    else { classe = "ALTO"; colore = "red"; }

    document.getElementById("risultatoComplessita").innerHTML =
      `<div class='result-box ${colore}'>Punteggio Complessità: ${totale}<br>Classe: ${classe}</div>`;

    window.classeComplessita = classe;
    window.punteggioComplessita = totale;
  } else {
    window.classeComplessita = null;
  }

  calcolaInteresse();
}

function calcolaInteresse(){
  let tipo = document.getElementById("tipo_progetto").value;
  let fasciaVal = document.getElementById("valore_fascia").value;
  let clienteIdx = document.getElementById("tipologia_cliente").value;

  if(tipo === "" || fasciaVal === "" || clienteIdx === "") return;

  let valoreClasse = parseInt(fasciaVal);
  let clienteVal = clienteOpzioni[parseInt(clienteIdx)].val;

  const matrice = {
    3: {1:"B", 2:"A", 3:"A"},
    2: {1:"C", 2:"B", 3:"A"},
    1: {1:"C", 2:"C", 3:"B"}
  };

  let risultato = matrice[clienteVal][valoreClasse];
  const legende = {
    A:"A - Massimo interesse",
    B:"B - Medio interesse",
    C:"C - Minimo interesse"
  };

  document.getElementById("risultatoInteresse").innerHTML =
    `<div class='result-box'>Classe Interesse: ${legende[risultato]}</div>`;

  window.classeInteresse = risultato;
  calcolaFinale();
}

function calcolaFinale(){
  if(!window.classeComplessita || !window.classeInteresse) return;

  const matriceFinale = {
    "A":{"ALTO":"Approfondita","MEDIO":"Approfondita","BASSO":"Strutturata"},
    "B":{"ALTO":"Strutturata","MEDIO":"Strutturata","BASSO":"Snella"},
    "C":{"ALTO":"Strutturata","MEDIO":"Snella","BASSO":"Snella"}
  };

  let esito = matriceFinale[window.classeInteresse][window.classeComplessita];

  document.getElementById("esitoFinale").innerHTML =
    `<div class='result-box'>${esito}</div>`;

  window.esitoFinale = esito;
}

function scaricaEApriMail(){
  const titoloProgetto = document.getElementById("titoloProgetto").value;
  const dataRicezione  = document.getElementById("dataRicezione").value;
  const dataOfferta    = document.getElementById("dataOfferta").value;
  const referente      = document.getElementById("referente").value;
  const refCommerciale = document.getElementById("refCommerciale").value;
  const finanziamento  = document.getElementById("finanziamento").value;
  const budget         = document.getElementById("budget").value;

  if(!titoloProgetto || !dataRicezione || !dataOfferta || !referente || !refCommerciale || !finanziamento || !budget){
    alert("Compilare tutti i campi iniziali.");
    return;
  }

  if(!window.esitoFinale){
    alert("Compilare tutte le domande.");
    return;
  }

  // ── Anno dalla data ricezione richiesta cliente ───────────────────────────
  const anno = dataRicezione.split("-")[0];

  // ── Formatta la data offerta in italiano (dd/mm/yyyy) ────────────────────
  const partiData = dataOfferta.split("-");
  const dataOffertaFormattata = partiData[2] + "/" + partiData[1] + "/" + partiData[0];

  // ── Nome file: Horo_NomeProgetto_Anno ─────────────────────────────────────
  const nomePulito = titoloProgetto.replace(/\s+/g, "_");
  const nomeFile = "Horo_" + nomePulito + "_" + anno + ".xlsx";

  const idValutazione = nomePulito + "_" + Date.now();
  const now = new Date();
  const dataDownload = now.toLocaleString("it-IT");

  let tipoProgetto = document.getElementById("tipo_progetto").value;
  let tipologiaRichiesta = "";
  if(tipoProgetto === "tappezzeria") tipologiaRichiesta = "solo tappezzeria";
  else if(tipoProgetto === "falegnameria") tipologiaRichiesta = "solo falegnameria";
  else if(tipoProgetto === "entrambe") tipologiaRichiesta = "entrambe";

  let wb = XLSX.utils.book_new();

  let risultati = [{
    "ID Valutazione":                   idValutazione,
    "Title":                            titoloProgetto,
    "Data ricezione richiesta cliente": dataRicezione,
    "Data richiesta per invio offerta": dataOfferta,
    "Nome referente progetto":          referente,
    "Ref. comm.le":                     refCommerciale,
    "Finanziamento/Bando":              finanziamento,
    "Budget":                           budget,
    "Tipologia Richiesta":              tipologiaRichiesta,
    "Data Download File":               dataDownload,
    "Punteggio Complessità":            window.punteggioComplessita,
    "Classe Complessità":               window.classeComplessita,
    "Classe Interesse":                 window.classeInteresse,
    "Tipologia Offerta":                window.esitoFinale
  }];

  let ws2 = XLSX.utils.json_to_sheet(risultati);
  XLSX.utils.book_append_sheet(wb, ws2, "Risultati");

  let risposte = [];
  complessitaData.forEach((item, index) => {
    let sel = document.getElementById("complessita_" + index);
    risposte.push({
      "ID Valutazione": idValutazione,
      "Sezione": "Complessità",
      "Domanda": item.domanda,
      "Risposta": sel.options[sel.selectedIndex].text
    });
  });

  let sTipo    = document.getElementById("tipo_progetto");
  let sFascia  = document.getElementById("valore_fascia");
  let sCliente = document.getElementById("tipologia_cliente");

  risposte.push({
    "ID Valutazione": idValutazione,
    "Sezione": "Interesse",
    "Domanda": "Tipo progetto",
    "Risposta": sTipo.options[sTipo.selectedIndex].text
  });
  risposte.push({
    "ID Valutazione": idValutazione,
    "Sezione": "Interesse",
    "Domanda": "Valore del progetto",
    "Risposta": sFascia.options[sFascia.selectedIndex].text
  });
  risposte.push({
    "ID Valutazione": idValutazione,
    "Sezione": "Interesse",
    "Domanda": "Tipologia cliente",
    "Risposta": sCliente.options[sCliente.selectedIndex].text
  });

  let ws1 = XLSX.utils.json_to_sheet(risposte);
  XLSX.utils.book_append_sheet(wb, ws1, "Risposte");

  XLSX.writeFile(wb, nomeFile);

  setTimeout(function(){
    const destinatario = "preventivi@divania.com";
    const oggetto = encodeURIComponent("Progetto: " + titoloProgetto);
    const corpo = encodeURIComponent(
      "Gentile Ufficio Preventivi,\n\n" +
      "in allegato trovi il file Excel relativo al progetto: " + titoloProgetto + "\n" +
      "Con scadenza il: " + dataOffertaFormattata + "\n\n" +
      "Cordiali saluti."
    );
    window.location.href = "mailto:" + destinatario + "?subject=" + oggetto + "&body=" + corpo;
  }, 1000);
}

</script>
</body>
</html>
